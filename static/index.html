<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CryptoBot Signal Dashboard</title>
<style>
:root {
  --bg:        #060c17;
  --bg2:       #0b1524;
  --bg3:       #101e30;
  --bg4:       #152640;
  --border:    #1b2f4a;
  --border2:   #243d5e;
  --text:      #e2eaf5;
  --muted:     #6b829e;
  --long:      #00e87a;
  --short:     #ff4560;
  --long-dim:  rgba(0,232,122,.12);
  --short-dim: rgba(255,69,96,.12);
  --long-glow: 0 0 28px rgba(0,232,122,.18);
  --short-glow:0 0 28px rgba(255,69,96,.18);
  --gold:      #f5c842;
  --silver:    #9bafc4;
  --bronze:    #c48a3a;
  --accent:    #4d8fff;
  --accent2:   #7c5cfc;
  --radius:    12px;
  --mono: 'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── HEADER ─────────────────────────────────────────── */
.header{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:56px;
  background:rgba(6,12,23,.92);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:32px;height:32px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.brand-name{font-size:16px;font-weight:700;letter-spacing:.5px;color:var(--text)}
.brand-sub{font-size:11px;color:var(--muted);letter-spacing:.3px}

.header-right{display:flex;align-items:center;gap:12px}

/* WS Status */
.ws-badge{
  display:flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:20px;
  background:var(--bg3);border:1px solid var(--border);
  font-size:11px;font-weight:500;
}
.ws-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--muted);flex-shrink:0;
}
.ws-badge.connected .ws-dot{background:var(--long);box-shadow:0 0 6px var(--long)}
.ws-badge.connected{border-color:rgba(0,232,122,.3)}
.ws-badge.disconnected .ws-dot{background:var(--short);box-shadow:0 0 6px var(--short)}
.ws-badge.error .ws-dot{background:var(--gold)}

.btn-scan{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:#fff;font-size:12px;font-weight:600;
  cursor:pointer;letter-spacing:.3px;
  transition:opacity .2s,transform .1s;
}
.btn-scan:hover{opacity:.9}
.btn-scan:active{transform:scale(.97)}
.btn-scan:disabled{opacity:.4;cursor:not-allowed}

/* ── STATS BAR ───────────────────────────────────────── */
.stats-bar{
  display:flex;align-items:center;flex-wrap:wrap;gap:0;
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 20px;overflow-x:auto;
}
.stat{
  display:flex;flex-direction:column;align-items:center;
  padding:10px 20px;border-right:1px solid var(--border);
  flex-shrink:0;
}
.stat:last-child{border-right:none}
.stat-val{font-size:18px;font-weight:700;font-family:var(--mono);line-height:1.2}
.stat-val.long{color:var(--long)}
.stat-val.short{color:var(--short)}
.stat-val.accent{color:var(--accent)}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}

.time-info{
  margin-left:auto;display:flex;align-items:center;gap:16px;
  font-size:11px;color:var(--muted);flex-shrink:0;padding:10px 0;
}
.time-info span{display:flex;align-items:center;gap:4px}
.time-val{color:var(--text);font-family:var(--mono);font-weight:500}

/* ── TOOLBAR ─────────────────────────────────────────── */
.toolbar{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:12px 20px;border-bottom:1px solid var(--border);
  background:var(--bg);position:sticky;top:56px;z-index:90;
}
.filter-grp{display:flex;gap:4px}
.filter-sep{width:1px;background:var(--border);margin:0 4px;align-self:stretch}

.fbtn{
  padding:5px 12px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--muted);
  font-size:12px;font-weight:500;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.fbtn:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.fbtn.active{background:var(--bg4);border-color:var(--border2);color:var(--text)}
.fbtn.long.active{background:rgba(0,232,122,.1);border-color:var(--long);color:var(--long)}
.fbtn.short.active{background:rgba(255,69,96,.1);border-color:var(--short);color:var(--short)}
.fbtn.gold.active{background:rgba(245,200,66,.1);border-color:var(--gold);color:var(--gold)}
.fbtn.silver.active{background:rgba(155,175,196,.1);border-color:var(--silver);color:var(--silver)}

.sort-select{
  margin-left:auto;padding:5px 10px;border-radius:6px;
  border:1px solid var(--border);background:var(--bg3);
  color:var(--muted);font-size:12px;cursor:pointer;outline:none;
}

/* ── SCANNING BANNER ─────────────────────────────────── */
.scan-banner{
  display:none;align-items:center;justify-content:center;gap:12px;
  padding:10px;background:rgba(77,143,255,.08);
  border-bottom:1px solid rgba(77,143,255,.2);
  font-size:13px;color:var(--accent);
}
.scan-banner.show{display:flex}
.scan-ring{
  width:18px;height:18px;border-radius:50%;
  border:2px solid rgba(77,143,255,.2);
  border-top-color:var(--accent);
  animation:spin .7s linear infinite;
}
.scan-dots span{animation:blink 1.2s infinite}
.scan-dots span:nth-child(2){animation-delay:.2s}
.scan-dots span:nth-child(3){animation-delay:.4s}

/* ── MAIN GRID ───────────────────────────────────────── */
main{padding:16px 20px;min-height:50vh}
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:14px;
}

/* ── EMPTY STATE ─────────────────────────────────────── */
.empty{
  grid-column:1/-1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 20px;gap:12px;color:var(--muted);
}
.empty-icon{font-size:48px;opacity:.4}
.empty p{font-size:14px}
.empty small{font-size:12px;opacity:.7}

/* ── SIGNAL CARD ─────────────────────────────────────── */
.card{
  border-radius:var(--radius);
  background:var(--bg2);
  border:1px solid var(--border);
  overflow:hidden;
  transition:transform .2s,box-shadow .2s;
  animation:fadeUp .35s ease both;
}
.card:hover{transform:translateY(-2px)}
.card.long{border-left:3px solid var(--long);box-shadow:var(--long-glow)}
.card.short{border-left:3px solid var(--short);box-shadow:var(--short-glow)}
.card.long:hover{box-shadow:0 0 40px rgba(0,232,122,.25)}
.card.short:hover{box-shadow:0 0 40px rgba(255,69,96,.25)}

/* Card header */
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 10px;
}
.card-sym{font-size:16px;font-weight:700;letter-spacing:.5px}
.card-dir{
  display:flex;align-items:center;gap:6px;
}
.dir-badge{
  padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;
  letter-spacing:.5px;
}
.dir-badge.long{background:var(--long-dim);color:var(--long)}
.dir-badge.short{background:var(--short-dim);color:var(--short)}
.conf-badge{
  font-size:12px;font-weight:600;
}
.conf-badge.gold{color:var(--gold)}
.conf-badge.silver{color:var(--silver)}
.conf-badge.bronze{color:var(--bronze)}

/* Price grid */
.price-grid{
  padding:4px 16px 12px;
  display:grid;grid-template-columns:1fr;gap:5px;
}
.price-row{
  display:grid;grid-template-columns:70px 1fr auto;
  align-items:center;gap:8px;padding:5px 10px;
  border-radius:6px;
}
.price-row.entry{background:var(--bg3)}
.price-row.sl{background:rgba(255,69,96,.05)}
.price-row.tp1{background:rgba(0,232,122,.04)}
.price-row.tp2{background:rgba(0,232,122,.04)}
.price-lbl{font-size:11px;color:var(--muted)}
.price-lbl small{font-size:10px;opacity:.7}
.price-num{font-family:var(--mono);font-size:13px;font-weight:600;text-align:right}
.price-pct{
  font-family:var(--mono);font-size:11px;font-weight:600;
  text-align:right;min-width:60px;
}
.price-pct.neg{color:var(--short)}
.price-pct.pos{color:var(--long)}
.price-pct.neu{color:var(--muted)}

/* Score bars */
.scores{padding:4px 16px 12px;display:flex;flex-direction:column;gap:7px}
.score-row{display:flex;align-items:center;gap:8px}
.score-tf{font-size:10px;font-weight:600;color:var(--muted);width:24px;flex-shrink:0}
.score-track{
  flex:1;height:5px;border-radius:3px;
  background:var(--bg3);overflow:visible;position:relative;
}
.score-fill{
  height:100%;border-radius:3px;max-width:100%;min-width:3px;
  transition:width .6s cubic-bezier(.4,0,.2,1);
}
.score-fill.bull{background:linear-gradient(90deg,rgba(0,232,122,.4),var(--long))}
.score-fill.bear{background:linear-gradient(90deg,rgba(255,69,96,.4),var(--short))}
.score-num{
  font-family:var(--mono);font-size:11px;font-weight:700;
  width:26px;text-align:right;flex-shrink:0;
}
.score-num.bull{color:var(--long)}
.score-num.bear{color:var(--short)}

/* Signals tab */
.tab-section{padding:0 16px 14px}
.tab-nav{display:flex;gap:6px;margin-bottom:8px}
.tab-btn{
  padding:3px 10px;border-radius:5px;font-size:11px;font-weight:600;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;transition:all .15s;
}
.tab-btn.active{background:var(--bg4);border-color:var(--border2);color:var(--text)}
.tab-body{display:none}
.tab-body.show{display:block}
.sig-item{
  display:flex;align-items:flex-start;gap:6px;
  font-size:11px;color:var(--muted);line-height:1.4;
  padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);
}
.sig-item:last-child{border-bottom:none}
.sig-item::before{content:"•";color:var(--border2);flex-shrink:0;margin-top:1px}

/* Card footer */
.card-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;background:var(--bg3);
  border-top:1px solid var(--border);
  font-size:11px;color:var(--muted);font-family:var(--mono);
}
.card-foot .atr{color:var(--muted)}
.card-foot .ema{
  padding:2px 8px;border-radius:4px;font-weight:600;
}
.card-foot .ema.bull{background:rgba(0,232,122,.1);color:var(--long)}
.card-foot .ema.bear{background:rgba(255,69,96,.1);color:var(--short)}

/* ── LOG PANEL ───────────────────────────────────────── */
.log-panel{
  margin:0 20px 20px;border-radius:var(--radius);
  border:1px solid var(--border);overflow:hidden;
}
.log-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--bg3);
  border-bottom:1px solid var(--border);font-size:12px;font-weight:600;
}
.log-head button{
  padding:3px 10px;border-radius:5px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:11px;cursor:pointer;
}
.log-head button:hover{color:var(--text);border-color:var(--border2)}
.log-feed{
  max-height:180px;overflow-y:auto;
  font-family:var(--mono);font-size:11px;
  background:var(--bg);
}
.log-entry{
  display:flex;gap:10px;padding:5px 14px;
  border-bottom:1px solid rgba(255,255,255,.03);
  animation:fadeIn .2s ease;
}
.log-entry:last-child{border-bottom:none}
.log-ts{color:var(--muted);flex-shrink:0}
.log-lvl{flex-shrink:0;font-weight:700;width:40px}
.log-lvl.INFO{color:var(--accent)}
.log-lvl.ERROR{color:var(--short)}
.log-lvl.WARN{color:var(--gold)}
.log-msg{color:var(--text)}

/* ── ANIMATIONS ──────────────────────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
@keyframes pulse{
  0%,100%{opacity:1}50%{opacity:.5}
}

/* ── RESPONSIVE ──────────────────────────────────────── */
@media(max-width:640px){
  .stat{padding:8px 12px}
  main{padding:12px}
  .toolbar{padding:10px 12px}
  .cards-grid{grid-template-columns:1fr}
  .header{padding:0 12px}
  .stats-bar{padding:0 12px}
}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="header">
  <div class="brand">
    <div class="brand-icon">⚡</div>
    <div>
      <div class="brand-name">CryptoBot</div>
      <div class="brand-sub">Futures Signal Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <div class="ws-badge" id="wsBadge">
      <span class="ws-dot"></span>
      <span id="wsText">Connecting…</span>
    </div>
    <button class="btn-scan" id="btnScan" onclick="scanNow()" disabled>
      ⚡ Scan Now
    </button>
  </div>
</header>

<!-- ── STATS BAR ── -->
<div class="stats-bar">
  <div class="stat">
    <span class="stat-val accent" id="statScanned">—</span>
    <span class="stat-lbl">Scanned</span>
  </div>
  <div class="stat">
    <span class="stat-val" id="statSignals">—</span>
    <span class="stat-lbl">Signals</span>
  </div>
  <div class="stat">
    <span class="stat-val long" id="statLong">—</span>
    <span class="stat-lbl">Long</span>
  </div>
  <div class="stat">
    <span class="stat-val short" id="statShort">—</span>
    <span class="stat-lbl">Short</span>
  </div>
  <div class="stat">
    <span class="stat-val accent" id="statLev">—</span>
    <span class="stat-lbl">Leverage</span>
  </div>
  <div class="stat">
    <span class="stat-val" id="statMode">—</span>
    <span class="stat-lbl">Mode</span>
  </div>
  <div class="time-info">
    <span>Last: <span class="time-val" id="lastScan">—</span></span>
    <span>Next: <span class="time-val" id="countdown">—</span></span>
  </div>
</div>

<!-- ── TOOLBAR ── -->
<div class="toolbar">
  <div class="filter-grp" id="dirFilter">
    <button class="fbtn active" data-dir="all">All</button>
    <button class="fbtn long"   data-dir="long">▲ Long</button>
    <button class="fbtn short"  data-dir="short">▼ Short</button>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-grp" id="confFilter">
    <button class="fbtn active" data-conf="all">All</button>
    <button class="fbtn gold"   data-conf="tinggi">★★★ Tinggi</button>
    <button class="fbtn silver" data-conf="sedang">★★☆ Sedang</button>
    <button class="fbtn"        data-conf="rendah">★☆☆ Rendah</button>
  </div>
  <select class="sort-select" id="sortSelect" onchange="applyFilters()">
    <option value="score">Sort: Score</option>
    <option value="sym">Sort: Symbol</option>
    <option value="tp1">Sort: TP1%</option>
  </select>
</div>

<!-- ── SCANNING BANNER ── -->
<div class="scan-banner" id="scanBanner">
  <div class="scan-ring"></div>
  <span>Scanning <span id="scanCount">—</span> coins…
    <span class="scan-dots"><span>.</span><span>.</span><span>.</span></span>
  </span>
</div>

<!-- ── MAIN ── -->
<main>
  <div class="cards-grid" id="grid">
    <div class="empty">
      <div class="empty-icon">📡</div>
      <p>Menunggu sinyal…</p>
      <small>Scan otomatis saat candle 15m tutup, atau klik Scan Now</small>
    </div>
  </div>
</main>

<!-- ── LOG PANEL ── -->
<div class="log-panel">
  <div class="log-head">
    <span>📋 Activity Log</span>
    <button onclick="clearLog()">Clear</button>
  </div>
  <div class="log-feed" id="logFeed"></div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────
let ws = null, reconnTimer = null;
let allSignals = [], cfg = {};
let activeDir = 'all', activeConf = 'all';
let nextScanEpoch = 0;

// ── WEBSOCKET ──────────────────────────────────────────────────
function connect() {
  // 0.0.0.0 tidak valid sebagai WS target di browser — fallback ke localhost
  const host = ['0.0.0.0', ''].includes(location.hostname) ? 'localhost:' + location.port : location.host;
  ws = new WebSocket(`ws://${host}/ws`);
  ws.onopen = () => {
    setWsStatus('connected', 'Live');
    document.getElementById('btnScan').disabled = false;
    clearTimeout(reconnTimer);
  };
  ws.onclose = () => {
    setWsStatus('disconnected', 'Disconnected');
    document.getElementById('btnScan').disabled = true;
    reconnTimer = setTimeout(connect, 3000);
  };
  ws.onerror = () => setWsStatus('error', 'Error');
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
}

function setWsStatus(cls, text) {
  const b = document.getElementById('wsBadge');
  b.className = 'ws-badge ' + cls;
  document.getElementById('wsText').textContent = text;
}

function handleMsg(m) {
  switch (m.type) {
    case 'init':
      cfg = m.config;
      updateStats(null, null);
      document.getElementById('statLev').textContent  = cfg.leverage + 'x';
      document.getElementById('statMode').textContent = cfg.auto_trade ? '🤖 Auto' : '👁 Watch';
      if (m.signals && m.signals.length) renderSignals(m.signals, m.scan_count || 0);
      if (m.last_scan) setLastScan(m.last_scan);
      if (m.next_scan) setNextScan(m.next_scan);
      if (m.logs) m.logs.forEach(addLog);
      break;
    case 'scanning':
      setScanning(true, m.count);
      break;
    case 'signals':
      setScanning(false);
      renderSignals(m.signals, m.scan_count);
      setLastScan(m.timestamp);
      if (m.next_scan) setNextScan(m.next_scan);
      break;
    case 'log':
      addLog(m);
      break;
    case 'error':
      addLog({ level:'ERROR', message: m.message, timestamp: now() });
      setScanning(false);
      break;
  }
}

function scanNow() {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'scan_now' }));
}

// ── RENDER ─────────────────────────────────────────────────────
function renderSignals(signals, scanCount) {
  allSignals = signals;
  updateStats(signals, scanCount);
  applyFilters();
}

function applyFilters() {
  const sort = document.getElementById('sortSelect').value;
  let filtered = allSignals.filter(s => {
    const dirOk  = activeDir  === 'all' || s.direction.toLowerCase() === activeDir;
    const confOk = activeConf === 'all' || s.confidence.toLowerCase() === activeConf;
    return dirOk && confOk;
  });
  if (sort === 'sym') filtered.sort((a,b) => a.symbol.localeCompare(b.symbol));
  else if (sort === 'tp1') filtered.sort((a,b) => Math.abs(b.tp1_pct) - Math.abs(a.tp1_pct));

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>Tidak ada sinyal yang cocok dengan filter</p></div>';
    return;
  }
  grid.innerHTML = filtered.map((s, i) => cardHTML(s, i * 40)).join('');
}

function cardHTML(s, delay) {
  const isLong  = s.direction === 'LONG';
  const dirCls  = isLong ? 'long' : 'short';
  const dirArrow = isLong ? '▲' : '▼';
  const confMap = { TINGGI:['gold','★★★'], SEDANG:['silver','★★☆'], RENDAH:['bronze','★☆☆'] };
  const [confCls, confStars] = confMap[s.confidence] || ['silver','★☆☆'];
  const emaIsBull = s.ema_trend_4h === 'BULL';

  const sigs15 = (s.signals_15m || []).slice(0, 5).map(t => `<div class="sig-item">${esc(t)}</div>`).join('');
  const sigs4h  = (s.signals_4h  || []).slice(0, 5).map(t => `<div class="sig-item">${esc(t)}</div>`).join('');

  const pct = (v, pos) => {
    const sign = v >= 0 ? '+' : '';
    const cls  = pos ? (v >= 0 ? 'pos' : 'neg') : (v >= 0 ? 'neg' : 'pos');
    return `<span class="price-pct ${cls}">${sign}${v.toFixed(2)}%</span>`;
  };
  const sl_pct  = s.sl_pct  || (s.sl  - s.price) / s.price * 100;
  const tp1_pct = s.tp1_pct || (s.tp1 - s.price) / s.price * 100;
  const tp2_pct = s.tp2_pct || (s.tp2 - s.price) / s.price * 100;

  const sc15 = s.score_15m || 0;
  const sc4h  = s.score_4h  || 0;
  const sc15w  = Math.min(Math.abs(sc15) / 8 * 100, 100);
  const sc4hw  = Math.min(Math.abs(sc4h)  / 8 * 100, 100);
  const uid = s.symbol.replace(/[^a-z0-9]/gi,'');

  return `
<div class="card ${dirCls}" style="animation-delay:${delay}ms"
     data-dir="${dirCls}" data-conf="${s.confidence.toLowerCase()}">
  <div class="card-head">
    <span class="card-sym">${s.symbol}</span>
    <div class="card-dir">
      <span class="dir-badge ${dirCls}">${dirArrow} ${s.direction}</span>
      <span class="conf-badge ${confCls}">${confStars}</span>
    </div>
  </div>

  <div class="price-grid">
    <div class="price-row entry">
      <span class="price-lbl">Entry</span>
      <span class="price-num">${fmtPrice(s.price)}</span>
      <span class="price-pct neu">—</span>
    </div>
    <div class="price-row sl">
      <span class="price-lbl">Stop Loss</span>
      <span class="price-num">${fmtPrice(s.sl)}</span>
      ${pct(sl_pct, false)}
    </div>
    <div class="price-row tp1">
      <span class="price-lbl">TP 1 <small>R:R ${s.rr1}</small></span>
      <span class="price-num">${fmtPrice(s.tp1)}</span>
      ${pct(tp1_pct, true)}
    </div>
    <div class="price-row tp2">
      <span class="price-lbl">TP 2 <small>R:R ${s.rr2}</small></span>
      <span class="price-num">${fmtPrice(s.tp2)}</span>
      ${pct(tp2_pct, true)}
    </div>
  </div>

  <div class="scores">
    <div class="score-row">
      <span class="score-tf">15m</span>
      <div class="score-track">
        <div class="score-fill ${sc15>=0?'bull':'bear'}" style="width:${sc15w}%"></div>
      </div>
      <span class="score-num ${sc15>=0?'bull':'bear'}">${sc15>0?'+':''}${sc15}</span>
    </div>
    <div class="score-row">
      <span class="score-tf">4H</span>
      <div class="score-track">
        <div class="score-fill ${sc4h>=0?'bull':'bear'}" style="width:${sc4hw}%"></div>
      </div>
      <span class="score-num ${sc4h>=0?'bull':'bear'}">${sc4h>0?'+':''}${sc4h}</span>
    </div>
  </div>

  <div class="tab-section">
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('${uid}','15m',this)">15m Entry</button>
      <button class="tab-btn"       onclick="switchTab('${uid}','4h',this)">4H Trend</button>
    </div>
    <div class="tab-body show" id="tab-${uid}-15m">${sigs15}</div>
    <div class="tab-body"      id="tab-${uid}-4h">${sigs4h}</div>
  </div>

  <div class="card-foot">
    <span class="atr">ATR 15m: ${fmtPrice(s.atr)}</span>
    <span class="ema ${emaIsBull?'bull':'bear'}">
      EMA 4H: ${emaIsBull ? '▲ Uptrend' : '▼ Downtrend'}
    </span>
  </div>
</div>`;
}

function switchTab(uid, tf, btn) {
  ['15m','4h'].forEach(t => {
    const el = document.getElementById('tab-'+uid+'-'+t);
    if (el) el.classList.toggle('show', t === tf);
  });
  btn.closest('.tab-nav').querySelectorAll('.tab-btn')
     .forEach(b => b.classList.toggle('active', b === btn));
}

// ── FILTERS ────────────────────────────────────────────────────
document.getElementById('dirFilter').addEventListener('click', e => {
  const btn = e.target.closest('[data-dir]');
  if (!btn) return;
  activeDir = btn.dataset.dir;
  document.querySelectorAll('#dirFilter .fbtn').forEach(b => {
    b.classList.toggle('active', b === btn);
  });
  applyFilters();
});

document.getElementById('confFilter').addEventListener('click', e => {
  const btn = e.target.closest('[data-conf]');
  if (!btn) return;
  activeConf = btn.dataset.conf;
  document.querySelectorAll('#confFilter .fbtn').forEach(b => {
    b.classList.toggle('active', b === btn);
  });
  applyFilters();
});

// ── STATS ──────────────────────────────────────────────────────
function updateStats(signals, scanCount) {
  if (!signals) return;
  document.getElementById('statScanned').textContent  = scanCount || '—';
  document.getElementById('statSignals').textContent  = signals.length;
  document.getElementById('statLong').textContent     = signals.filter(s=>s.direction==='LONG').length;
  document.getElementById('statShort').textContent    = signals.filter(s=>s.direction==='SHORT').length;
}

// ── SCANNING STATE ─────────────────────────────────────────────
function setScanning(on, count) {
  const b = document.getElementById('scanBanner');
  b.classList.toggle('show', on);
  if (count) document.getElementById('scanCount').textContent = count;
  document.getElementById('btnScan').disabled = on;
}

// ── TIME ───────────────────────────────────────────────────────
function setLastScan(iso) {
  const d = new Date(iso);
  document.getElementById('lastScan').textContent =
    d.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function setNextScan(epoch) {
  nextScanEpoch = epoch * 1000;
}

function tickCountdown() {
  if (!nextScanEpoch) return;
  const rem = Math.max(0, nextScanEpoch - Date.now());
  const m   = Math.floor(rem / 60000);
  const s   = Math.floor((rem % 60000) / 1000);
  document.getElementById('countdown').textContent = `${m}m ${s.toString().padStart(2,'0')}s`;
}
setInterval(tickCountdown, 1000);

// ── LOG ────────────────────────────────────────────────────────
function addLog(entry) {
  const feed = document.getElementById('logFeed');
  const div  = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `
    <span class="log-ts">${entry.timestamp}</span>
    <span class="log-lvl ${entry.level}">${entry.level}</span>
    <span class="log-msg">${esc(entry.message)}</span>`;
  feed.prepend(div);
  while (feed.children.length > 80) feed.removeChild(feed.lastChild);
}

function clearLog() { document.getElementById('logFeed').innerHTML = ''; }

// ── UTILS ──────────────────────────────────────────────────────
function fmtPrice(p) {
  if (!p && p !== 0) return '—';
  if (p >= 1000) return p.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
  if (p >= 1)    return p.toLocaleString('en-US', { minimumFractionDigits:4, maximumFractionDigits:4 });
  return p.toLocaleString('en-US', { minimumFractionDigits:6, maximumFractionDigits:6 });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function now() {
  return new Date().toTimeString().slice(0,8);
}

// ── BOOT ───────────────────────────────────────────────────────
connect();
</script>
</body>
</html>
