name: Deploy to Server

# NOTE: Auto-deploy disabled — repo migrated to Freqtrade (native, Python 3.12).
# Server must be provisioned first: Python 3.12 + TA-Lib + venv + freqtrade.
# This workflow is a placeholder and runs only when triggered manually.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Freqtrade via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/botbot2
            git pull origin master
            .venv/bin/pip install -r requirements.txt -q
            sudo systemctl restart freqtrade
            sudo systemctl status freqtrade --no-pager -l
